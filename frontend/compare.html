<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Compare Models | India</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://icon-library.com/images/bmw-icon/bmw-icon-11.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <!-- Navbar (same as above) -->
    <nav class="navbar">
        <div class="logo">
            <img src="https://1000logos.net/wp-content/uploads/2018/02/BMW-Logo.png" alt="BMW Logo" class="bmw-logo">
            <span>India</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="models.html">Models</a></li>
            <li><a href="compare.html">Compare Models</a></li>
        </ul>
        <div class="nav-right">
            <a href="#" class="nav-icon"><i class="fas fa-search"></i></a>
            <a href="#" class="nav-icon"><i class="fas fa-user"></i></a>
            <div class="menu-toggle"><i class="fas fa-bars"></i></div>
        </div>
    </nav>


    <!-- Compare Hero Section -->
    <section class="page-hero">
        <h1>Compare BMW Models</h1>
        <p>Select two models to see detailed comparison and recommendation</p>
    </section>

    <!-- Compare Section -->
    <section class="compare-section">
        <div class="compare-selector">
            <div class="select-wrapper">
                <label for="car1">Select First BMW</label>
                <select id="car1" class="car-select"></select>
            </div>
            <div class="vs-badge">VS</div>
            <div class="select-wrapper">
                <label for="car2">Select Second BMW</label>
                <select id="car2" class="car-select"></select>
            </div>
        </div>

        <button id="compare-now-btn" class="btn compare-btn">Compare Now</button>

        <!-- Comparison Result -->
        <div id="compare-result" class="compare-result hidden">
            <div class="compare-cards">
                <!-- Car 1 Card -->
                <div class="compare-card" id="compare-card-1">
                    <img id="car1-img" src="" alt="Car 1">
                    <h3 id="car1-name"></h3>
                    <div class="specs-list">
                        <div class="spec-item">
                            <span class="spec-label">Price</span>
                            <span class="spec-value" id="car1-price"></span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Engine</span>
                            <span class="spec-value" id="car1-engine"></span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Power</span>
                            <span class="spec-value" id="car1-power"></span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">0-100 km/h</span>
                            <span class="spec-value" id="car1-accel"></span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Fuel Type</span>
                            <span class="spec-value" id="car1-fuel"></span>
                        </div>
                    </div>
                </div>

                <!-- Car 2 Card -->
                <div class="compare-card" id="compare-card-2">
                    <img id="car2-img" src="" alt="Car 2">
                    <h3 id="car2-name"></h3>
                    <div class="specs-list">
                        <div class="spec-item">
                            <span class="spec-label">Price</span>
                            <span class="spec-value" id="car2-price"></span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Engine</span>
                            <span class="spec-value" id="car2-engine"></span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Power</span>
                            <span class="spec-value" id="car2-power"></span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">0-100 km/h</span>
                            <span class="spec-value" id="car2-accel"></span>
                        </div>
                        <div class="spec-item">
                            <span class="spec-label">Fuel Type</span>
                            <span class="spec-value" id="car2-fuel"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recommendation Section -->
            <!-- <div class="recommendation-box" id="recommendation">
                <h3><i class="fas fa-star"></i> Our Recommendation</h3>
                <p id="recommendation-text"></p>
            </div> -->
        </div>
    </section>

    <!-- Chatbot Widget -->
    <div class="chatbot-widget">
        <div class="chat-icon" id="chat-icon"><i class="fas fa-robot"></i></div>
        <div class="chat-box" id="chat-box">
            <div class="chat-header">
                <span>BMW Assistant</span>
                <i class="fas fa-times" id="close-chat"></i>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="bot-message">Hello! Ask me about any BMW model.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button id="send-chat"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
