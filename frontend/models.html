<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Models | India</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://icon-library.com/images/bmw-icon/bmw-icon-11.jpg" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <img src="https://1000logos.net/wp-content/uploads/2018/02/BMW-Logo.png" alt="BMW Logo" class="bmw-logo">
            <span>India</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="models.html">Models</a></li>
            <li><a href="compare.html">Compare Models</a></li>
        </ul>
        <div class="nav-right">
            <a href="#" class="nav-icon"><i class="fas fa-search"></i></a>
            <a href="#" class="nav-icon"><i class="fas fa-user"></i></a>
            <div class="menu-toggle"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <!-- Search Section -->
    <section class="search-section">
        <h2>Find Your BMW</h2>
        <input type="text" id="search-input" placeholder="Search by model name...">
    </section>

    <!-- Car Listing -->
    <section class="car-listing">
        <h2>All BMW Models</h2>
        <div class="car-grid" id="car-grid"></div>
    </section>

    <!-- Chatbot Widget -->
    <div class="chatbot-widget">
        <div class="chat-icon" id="chat-icon"><i class="fas fa-robot"></i></div>
        <div class="chat-box" id="chat-box">
            <div class="chat-header">
                <span>BMW Assistant</span>
                <i class="fas fa-times" id="close-chat"></i>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="bot-message">Hello! Ask me about any BMW model.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button id="send-chat"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
